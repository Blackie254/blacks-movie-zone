<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlueBlizzard FreeFlix</title>
  <link rel="stylesheet" href="/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <div class="nav-left">
      <a href="/" class="logo" onclick="navigate('/');return false;">
        <span class="logo-ice">❄</span>
        <span class="logo-text">Blue<span class="logo-accent">Blizzard</span></span>
        <span class="logo-sub">FreeFlix</span>
      </a>
      <div class="nav-links">
        <a href="/" class="nav-link" data-page="home" onclick="navigate('/');return false;">Home</a>
        <a href="/movies" class="nav-link" data-page="movies" onclick="navigate('/movies');return false;">Movies</a>
        <a href="/shows" class="nav-link" data-page="shows" onclick="navigate('/shows');return false;">TV Shows</a>
        <a href="/trending" class="nav-link" data-page="trending" onclick="navigate('/trending');return false;">Trending</a>
        <a href="/browse" class="nav-link" data-page="browse" onclick="navigate('/browse');return false;">Browse</a>
        <a href="/live" class="nav-link" data-page="live" onclick="navigate('/live');return false;">📡 Live</a>
        <a href="/new" class="nav-link" data-page="new" onclick="navigate('/new');return false;">🆕 New</a>
      </div>
    </div>
    <div class="nav-right">
      <div class="search-wrap" id="searchWrap">
        <input type="text" id="searchInput" class="search-input" placeholder="Search… (press /)" autocomplete="off" spellcheck="false" />
        <button class="search-btn" id="searchBtn" aria-label="Search">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <div class="search-suggestions" id="searchSuggestions"></div>
      </div>
      <div class="hamburger" id="hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </div>
    </div>
  </nav>

  <!-- MOBILE MENU -->
  <div class="mobile-menu" id="mobileMenu">
    <a href="/" class="nav-link" data-page="home" onclick="navigate('/');mobileMenu.classList.remove('open');return false;">Home</a>
    <a href="/movies" class="nav-link" data-page="movies" onclick="navigate('/movies');mobileMenu.classList.remove('open');return false;">Movies</a>
    <a href="/shows" class="nav-link" data-page="shows" onclick="navigate('/shows');mobileMenu.classList.remove('open');return false;">TV Shows</a>
    <a href="/trending" class="nav-link" data-page="trending" onclick="navigate('/trending');mobileMenu.classList.remove('open');return false;">Trending</a>
    <a href="/browse" class="nav-link" data-page="browse" onclick="navigate('/browse');mobileMenu.classList.remove('open');return false;">Browse</a>
    <a href="/live" class="nav-link" data-page="live" onclick="navigate('/live');mobileMenu.classList.remove('open');return false;">📡 Live TV</a>
    <a href="/new" class="nav-link" data-page="new" onclick="navigate('/new');mobileMenu.classList.remove('open');return false;">🆕 New Arrivals</a>
  </div>

  <!-- MAIN APP -->
  <div id="app"></div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- VIDEO PLAYER OVERLAY -->
  <div class="player-overlay" id="playerOverlay">
    <div class="player-container" id="playerContainer">
      <button class="player-close" id="playerClose" aria-label="Close">✕</button>
      <button class="player-fullscreen-btn" id="playerFullscreenBtn" aria-label="Fullscreen">
        <svg id="fsIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/>
          <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
      <div class="player-header" id="playerHeader"></div>
      <div class="player-body" id="playerBody"></div>
      <div class="player-info" id="playerInfo"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
