<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BlueBlizzard FreeFlix</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <div class="nav-left">
      <a href="/" class="logo">
        <span class="logo-ice">❄</span>
        <span class="logo-text">Blue<span class="logo-accent">Blizzard</span></span>
        <span class="logo-sub">FreeFlix</span>
      </a>
      <div class="nav-links">
        <a href="/" class="nav-link" data-page="home">Home</a>
        <a href="/movies" class="nav-link" data-page="movies">Movies</a>
        <a href="/shows" class="nav-link" data-page="shows">TV Shows</a>
        <a href="/trending" class="nav-link" data-page="trending">Trending</a>
        <a href="/browse" class="nav-link" data-page="browse">Browse</a>
      </div>
    </div>
    <div class="nav-right">
      <div class="search-wrap" id="searchWrap">
        <input type="text" id="searchInput" class="search-input" placeholder="Search movies, shows..." autocomplete="off" />
        <button class="search-btn" id="searchBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
        <div class="search-suggestions" id="searchSuggestions"></div>
      </div>
    </div>
  </nav>

  <!-- MAIN APP -->
  <div id="app">
    <!-- Pages rendered here by JS -->
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <!-- MODAL / VIDEO PLAYER -->
  <div class="player-overlay" id="playerOverlay">
    <div class="player-container">
      <button class="player-close" id="playerClose">✕</button>
      <div class="player-header" id="playerHeader"></div>
      <div class="player-body" id="playerBody">
        <video id="videoPlayer" controls autoplay playsinline crossorigin="anonymous"></video>
      </div>
      <div class="player-info" id="playerInfo"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
