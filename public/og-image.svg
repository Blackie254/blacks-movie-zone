<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080c14"/>
      <stop offset="100%" style="stop-color:#0f1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="980" cy="120" r="200" fill="#38bdf8" opacity="0.04"/>
  <circle cx="220" cy="500" r="160" fill="#818cf8" opacity="0.05"/>

  <!-- Snowflake icon -->
  <text x="100" y="310" font-family="Arial, sans-serif" font-size="120" fill="url(#accent)" filter="url(#glow)" opacity="0.9">❄</text>

  <!-- Brand name -->
  <text x="260" y="268" font-family="Arial Black, sans-serif" font-size="80" font-weight="900" fill="#f0f6ff">Blue</text>
  <text x="455" y="268" font-family="Arial Black, sans-serif" font-size="80" font-weight="900" fill="url(#accent)">Blizzard</text>

  <!-- Sub title -->
  <text x="262" y="320" font-family="Arial, sans-serif" font-size="38" font-weight="700" fill="#64748b" letter-spacing="8">F R E E F L I X</text>

  <!-- Divider -->
  <rect x="100" y="355" width="1000" height="2" fill="url(#accent)" opacity="0.3"/>

  <!-- Tagline -->
  <text x="100" y="420" font-family="Arial, sans-serif" font-size="34" fill="#94a3b8">Free Movies · TV Shows · Live Sports · Comedy · News</text>

  <!-- Pills -->
  <rect x="100" y="455" width="180" height="46" rx="23" fill="#38bdf8" opacity="0.15"/>
  <text x="190" y="484" font-family="Arial, sans-serif" font-size="22" fill="#38bdf8" text-anchor="middle">HD Streaming</text>

  <rect x="298" y="455" width="180" height="46" rx="23" fill="#818cf8" opacity="0.15"/>
  <text x="388" y="484" font-family="Arial, sans-serif" font-size="22" fill="#818cf8" text-anchor="middle">No Sign-Up</text>

  <rect x="496" y="455" width="160" height="46" rx="23" fill="#34d399" opacity="0.15"/>
  <text x="576" y="484" font-family="Arial, sans-serif" font-size="22" fill="#34d399" text-anchor="middle">100% Free</text>

  <!-- URL -->
  <text x="100" y="580" font-family="Arial, sans-serif" font-size="24" fill="#475569">blueblizzard.replit.app</text>
</svg>
